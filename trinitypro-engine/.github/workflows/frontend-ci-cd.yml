name: Frontend CI/CD to AWS ECR

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY_FRONTEND: ${{ secrets.AWS_ECR_REPOSITORY_FRONTEND }}
  IMAGE_TAG: ${{ github.sha }}
  # Frontend environment variable for the backend API URL
  # In production, this would be the actual public URL of your backend.
  # If using Fargate/ECS, this could be the internal DNS name of the backend service within the VPC.
  NEXT_PUBLIC_BACKEND_API_URL_PROD: http://your-backend-loadbalancer-url:3000 # <-- IMPORTANT: REPLACE THIS WITH YOUR ACTUAL BACKEND URL

jobs:
  build-and-push-frontend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole # Create this IAM role in AWS
        aws-region: ${{ env.AWS_REGION }}
        # If not using OIDC, use:
        # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push frontend Docker image
      working-directory: ./frontend
      run: |
        docker build \
          --build-arg NEXT_PUBLIC_BACKEND_API_URL=${{ env.NEXT_PUBLIC_BACKEND_API_URL_PROD }} \
          -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest
    
    # Optional: Deploy to ECS/Fargate (requires additional setup like ECS task definition, service update)
    # - name: Deploy to Amazon ECS
    #   if: github.ref == 'refs/heads/main'
    #   uses: aws-actions/amazon-ecs-deploy@v1
    #   with:
    #     task-definition: your-frontend-task-definition.json # Path to your task definition file
    #     service: your-frontend-ecs-service
    #     cluster: your-ecs-cluster
    #     wait-for-service-stability: true
    #     image: $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG